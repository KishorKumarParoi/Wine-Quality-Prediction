apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wine-quality-artifacts-pvc
  namespace: wine-quality
  labels:
    app: wine-quality-prediction
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wine-quality-logs-pvc
  namespace: wine-quality
  labels:
    app: wine-quality-prediction
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi
