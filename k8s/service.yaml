apiVersion: v1
kind: Service
metadata:
  name: wine-quality-service
  namespace: wine-quality
  labels:
    app: wine-quality-prediction
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    app: wine-quality-prediction

---
apiVersion: v1
kind: Service
metadata:
  name: wine-quality-service-clusterip
  namespace: wine-quality
  labels:
    app: wine-quality-prediction
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app: wine-quality-prediction
