apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wine-quality

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - rbac.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - ingress.yaml
  - network-policy.yaml

# Common labels applied to all resources
commonLabels:
  app: wine-quality-prediction
  managed-by: kustomize

# Images to build or patch
images:
  - name: kishorkumarparoi/wine-quality-prediction
    newTag: latest

# Replicas override (can be overridden per environment)
replicas:
  - name: wine-quality-app
    count: 3

# Resource names prefix (optional)
namePrefix: wine-quality-

# Patches for environment-specific configs
# patchesStrategicMerge:
# - deployment-patch.yaml

# Configuration patches
configMapGenerator:
  - name: wine-quality-config
    behavior: create

secretGenerator:
  - name: mlflow-credentials
    behavior: create
