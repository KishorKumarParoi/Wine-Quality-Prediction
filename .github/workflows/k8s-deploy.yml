name: Deploy to Kubernetes

on:
    push:
        branches:
            - main
        paths:
            - "k8s/**"
            - "app.py"
            - "requirements.txt"
            - ".github/workflows/k8s-deploy.yml"
    workflow_dispatch:
        inputs:
            environment:
                description: "Environment to deploy to"
                required: true
                default: "dev"
                type: choice
                options:
                    - dev
                    - staging
                    - prod

jobs:
    deploy:
        runs-on: ubuntu-latest

        environment:
            name: ${{ github.event.inputs.environment || 'dev' }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up kubectl
              uses: azure/setup-kubectl@v3
              with:
                  version: "v1.28.0"

            - name: Configure kubeconfig
              run: |
                  mkdir -p $HOME/.kube
                  echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
                  chmod 600 $HOME/.kube/config

            - name: Verify cluster connection
              run: kubectl cluster-info

            - name: Create namespace if not exists
              run: kubectl create namespace wine-quality --dry-run=client -o yaml | kubectl apply -f -

            - name: Update secrets
              run: |
                  kubectl create secret generic mlflow-credentials \
                    --from-literal=MLFLOW_TRACKING_USERNAME=${{ secrets.MLFLOW_USERNAME }} \
                    --from-literal=MLFLOW_TRACKING_PASSWORD=${{ secrets.MLFLOW_PASSWORD }} \
                    -n wine-quality \
                    --dry-run=client -o yaml | kubectl apply -f -

            - name: Deploy with kubectl
              run: |
                  kubectl apply -k k8s/
                  kubectl set image deployment/wine-quality-app \
                    wine-quality-app=kishorkumarparoi/wine-quality-prediction:latest \
                    -n wine-quality

            - name: Wait for rollout
              run: kubectl rollout status deployment/wine-quality-app -n wine-quality --timeout=5m

            - name: Verify deployment
              run: |
                  echo "=== Pod Status ==="
                  kubectl get pods -n wine-quality
                  echo "=== Service Status ==="
                  kubectl get svc -n wine-quality
                  echo "=== Deployment Status ==="
                  kubectl describe deployment wine-quality-app -n wine-quality

            - name: Notify deployment
              if: success()
              run: |
                  echo "✅ Deployment successful!"
                  kubectl get pods -n wine-quality
